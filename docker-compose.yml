version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ieee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ieee_finance
    ports:
      - '5432:5432'
    volumes:
      - ieee_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ieee_pgdata:
