version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: ieee-finance-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  backend:
    build:
      context: ./server
    container_name: ieee-finance-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://admin:password@mongodb:27017/ieee-finance?authSource=admin
      - JWT_SECRET=ieee-secret-development-key
      - JWT_EXPIRY=7d
      - JWT_REFRESH_SECRET=ieee-secret-refresh-key
      - JWT_REFRESH_EXPIRY=30d
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: .
    container_name: ieee-finance-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
